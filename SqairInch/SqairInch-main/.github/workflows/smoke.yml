name: Smoke

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

jobs:
  smoke:
    name: typecheck + lint + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Smoke
        run: pnpm smoke
